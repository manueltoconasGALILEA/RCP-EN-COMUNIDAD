    <title>UNPA UART - Escuela de Enfermería</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        :root { --unpa-blue: #004a99; --uart-violet: #800080; --uart-red: #e30613; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .bg-unpa { background-color: var(--unpa-blue); }
        .bg-uart-v { background-color: var(--uart-violet); }
        .text-unpa { color: var(--unpa-blue); }
        .text-uart { color: var(--uart-red); }
        .bg-uart { background-color: var(--uart-red); }
        
        .view-section { display: none; animation: fadeIn 0.4s ease-out; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-mod { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border-top: 4px solid var(--unpa-blue); }
        
        /* Laboratorio CSS */
        .chain-link, .dea-step { cursor: grab; user-select: none; transition: all 0.2s; }
        .chain-link:active, .dea-step:active { cursor: grabbing; }
        .drag-over { border: 2px dashed var(--uart-red) !important; background-color: #fff5f5 !important; }
        .chat-bubble { max-width: 80%; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; animation: fadeIn 0.3s ease-out; }
        .chat-operator { background-color: #e2e8f0; color: #1e293b; border-bottom-left-radius: 0; align-self: flex-start; }
        .chat-user { background-color: var(--uart-red); color: white; border-bottom-right-radius: 0; align-self: flex-end; }
        .pulse-circle { transition: transform 0.1s ease-out, box-shadow 0.1s ease-out; }
        .pulse-active { transform: scale(1.05); box-shadow: 0 0 30px rgba(227, 6, 19, 0.4); }
        .rcp-hands { transition: transform 0.1s ease-out; transform-origin: center; }
        .pulse-active .rcp-hands { transform: translateY(15px); }
        .cambio-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--uart-red); color: white; font-weight: 900; font-size: 3rem; padding: 2rem 4rem; border-radius: 1rem; z-index: 100; animation: popInAndOut 2.5s forwards; pointer-events: none; display: none; text-align: center; }
        @keyframes popInAndOut { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 15% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); } 30% { transform: translate(-50%, -50%) scale(1); } 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); } }
        .hazard-zone { position: absolute; border-radius: 50%; background: rgba(239, 68, 68, 0.2); border: 2px dashed #ef4444; cursor: pointer; transition: all 0.3s; animation: pulse-border 2s infinite; }
